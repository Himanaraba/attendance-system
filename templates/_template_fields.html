{# Shared form fields for add/edit template modals #}
<div class="mb-3">
  <label class="form-label fw-semibold">{{ msg('Title','タイトル') }} <span class="text-danger">*</span></label>
  <input type="text" name="title" class="form-control" required maxlength="200">
</div>
<div class="mb-3">
  <label class="form-label fw-semibold">{{ msg('Day of Week','曜日') }} <span class="text-danger">*</span></label>
  <select name="day_of_week" class="form-select" required>
    {% for i in range(7) %}
    <option value="{{ i }}">{{ day_name(i) }}曜日</option>
    {% endfor %}
  </select>
</div>
<div class="row g-2">
  <div class="col-6">
    <label class="form-label fw-semibold">{{ msg('Start Time','開始時刻') }} <span class="text-danger">*</span></label>
    <input type="time" name="start_time" class="form-control" required>
  </div>
  <div class="col-6">
    <label class="form-label fw-semibold">{{ msg('End Time','終了時刻') }} <span class="text-danger">*</span></label>
    <input type="time" name="end_time" class="form-control" required>
  </div>
</div>
<div class="mt-3 p-3 bg-body-secondary rounded">
  <div class="form-check form-switch">
    <input class="form-check-input" type="checkbox" role="switch"
           name="is_auto" id="isAutoCheck" value="1">
    <label class="form-check-label fw-semibold" for="isAutoCheck">
      <i class="bi bi-magic text-success"></i>
      {{ msg('Auto-generate events','自動生成 ON') }}
    </label>
  </div>
  <div class="form-text mt-1">
    {{ msg('Events will be automatically created for the next 6 weeks whenever the dashboard is loaded.',
           'ダッシュボードを開くたびに今日〜6週先のイベントが自動生成されます。') }}
  </div>
</div>
